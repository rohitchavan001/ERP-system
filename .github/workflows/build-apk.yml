name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build APK with Buildozer Docker
      run: |
        cd mobile
        docker run --rm -v "$(pwd):/home/user/app" kivy/buildozer:latest bash -c "cd /home/user/app && buildozer android debug"
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: erp-mobile-apk
        path: mobile/bin/*.apk
        if-no-files-found: error
